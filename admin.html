<h2>Dashboard Confirmaciones</h2>

<div class="stats">
    <div class="card" id="totalConfirmados"></div>
    <div class="card" id="totalAcompanantes"></div>
    <div class="card" id="totalPersonas"></div>
</div>

<input type="text" id="searchInput" placeholder="Buscar apellido...">

<table class="dashboard-table">
<thead>
<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Acompañantes</th>
<th>Cantidad</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaConfirmaciones"></tbody>
</table>

<button id="logoutBtn">Cerrar sesión</button>

<div id="modalConfirm" class="modal">
    <div class="modal-content">
        <p>¿Seguro que querés eliminar este confirmado?</p>
        <div class="modal-buttons">
            <button id="cancelBtn">Cancelar</button>
            <button id="confirmBtn">Eliminar</button>
        </div>
    </div>
</div>

<link rel="stylesheet" href="./styles/dashboard.css">
<script src="./js/admin.js"></script>
